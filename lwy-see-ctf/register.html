    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <span>&#9763;</span> Learn With Yuvi
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="articles.html">Articles</a></li>
            <li><a href="cyber-security.html">Cyber Security</a></li>

            <li><a href="admin-login.html">Admin Login</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="auth-container">
            <h2>Create an Account</h2>
            <form onsubmit="event.preventDefault(); window.location.href='login.html';">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn primary">Register Now</button>
            </form>
            <p class="text-center mt-4" style="font-size: 0.9rem;">
                Already have an account? <a href="login.html">Login here</a>.
            </p>
        </div>
    </div>

    <footer>
        <p>Created by <a href="https://in.linkedin.com/in/researcher-yuvi" target="_blank" class="glow-link">Yuvraj Gupta</a> &ndash; Ethical Hacker | Learn With Yuvi</p>
    </footer>
    <script src="js/app-core.js"></script>
</body>
